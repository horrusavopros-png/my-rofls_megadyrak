<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАЗГОВОР С АНТОНОМ</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #fff; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Окошко в стиле модерн/минимализм */
        .chat-window {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            transition: 0.5s;
        }

        .question {
            font-size: 1.5em;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: underline;
        }
        .question:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* Скрытые элементы разговора */
        #chigur-zone {
            display: none; /* Скрыто до клика */
            margin-top: 20px;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .chigur-img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid red;
            box-shadow: 0 0 20px red;
            margin-bottom: 20px;
        }

        .answer {
            color: red;
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        .back { position: absolute; bottom: 20px; color: #444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="chat-window">
        <!-- Кнопка-вопрос -->
        <div id="ask-btn" class="question" onclick="startTalk()">— Как дела?</div>

        <!-- Появляющаяся зона с Антоном -->
        <div id="chigur-zone">
            <img src="ANTONCHIGYN" alt="Антон" class="chigur-img">
            <div class="answer">А твоё какое дело.... дружок.</div>
        </div>
    </div>

    <!-- Трактор и музыка остаются (скрыты) -->
    <img id="tractor" src="maxresdefault.jpg" style="display:none; width: 200px; position: fixed; bottom: 10px; right: 10px;">
    <audio id="music" src="https://www.myinstants.com"></audio>

    <a href="index.html" class="back">← уйти, пока цел</a>

    <script>
        function startTalk() {
            // Прячем вопрос
            document.getElementById('ask-btn').style.display = 'none';
            
            // Показываем Антона
            const zone = document.getElementById('chigur-zone');
            zone.style.display = 'block';

            // Можно добавить музыку или звук для атмосферы
            const music = document.getElementById('music');
            music.play();
        }
    </script>

</body>
</html>
