<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ПРАВДА ОБ АНТОНЕ</title>
    <style>
        body { 
            background: radial-gradient(circle, #2b0000 0%, #000000 100%); 
            color: #fff; text-align: center; font-family: sans-serif; 
            padding: 50px; margin: 0; border: 5px solid #ff0000; min-height: 100vh;
        }
        h1 { color: #ff0000; font-size: 3em; text-shadow: 0 0 15px #ff0000; }
        .main-img { max-width: 450px; border: 3px solid #ff0000; border-radius: 20px; box-shadow: 0 0 30px #ff0000; }
        .summon-btn { 
            background: #ff0000; color: white; padding: 20px 40px; 
            font-weight: bold; border: none; border-radius: 50px;
            cursor: pointer; font-size: 1.5em; margin: 30px; box-shadow: 0 0 20px #ff0000;
        }
        #tractor { 
            display: none; width: 350px; position: fixed; 
            bottom: 20px; right: -500px; z-index: 1000;
            transition: right 1s ease-out; 
        }
        .back { margin-top: 50px; display: inline-block; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <h1>АНТОН ЧУГУН НИКОГО НЕ УБИВАЛ!!!!!!!</h1>
    <!-- ПРОВЕРЬ: если файл на GitHub называется ANTONCHIGYN.jpg, добавь .jpg в src -->
    <img src="ANTONCHIGYN" alt="Антон" class="main-img">
    <br>
    <button class="summon-btn" onclick="summonTractor()">ПРИЗВАТЬ ТРАКТОР</button>
    <img id="tractor" src="maxresdefault.jpg" alt="Трактор">
    <audio id="music" src="https://www.myinstants.com"></audio>
    <a href="index.html" class="back">← Вернуться к Артемию Всевластному</a>
    <script>
        function summonTractor() {
            const tractor = document.getElementById('tractor');
            const music = document.getElementById('music');
            tractor.style.display = 'block';
            setTimeout(() => { tractor.style.right = '10%'; }, 100);
            music.play();
        }
    </script>
</body>
</html>
