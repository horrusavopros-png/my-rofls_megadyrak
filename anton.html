<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ПРАВДА ОБ АНТОНЕ</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Courier New', monospace; padding: 50px; border: 15px double red; min-height: 90vh; }
        h1 { color: red; font-size: 3em; text-shadow: 0 0 20px red; }
        img { max-width: 500px; border: 5px solid white; margin: 20px; display: block; margin-left: auto; margin-right: auto; }
        #tractor { display: none; width: 300px; position: fixed; bottom: 10%; left: 35%; z-index: 100; }
        button { background: red; color: white; padding: 20px; font-weight: bold; border: none; cursor: pointer; font-size: 1.5em; margin: 20px; }
        .back { margin-top: 50px; display: block; color: gray; text-decoration: none; }
    </style>
</head>
<body>

    <h1>АНТОН ЧУГУН НИКОГО НЕ УБИВАЛ!!!!!!!</h1>
    
    <!-- Главное фото Антона -->
    <img src="ANTONCHIGYN" alt="Антон">

    <button onclick="summonTractor()">ПРИЗВАТЬ ТРАКТОР</button>

    <!-- Трактор -->
    <img id="tractor" src="maxresdefault.jpg" alt="Трактор">

    <audio id="music" src="https://www.myinstants.com"></audio>

    <a href="index.html" class="back">Вернуться к Артемию Всевластному</a>

    <script>
        function summonTractor() {
            document.getElementById('tractor').style.display = 'block';
            document.getElementById('music').play();
            alert("ТРАКТОР ПРИЗВАН!");
        }
    </script>

</body>
</html>
