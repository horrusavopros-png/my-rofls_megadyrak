<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАЗГОВОР С ПИКСЕЛЬНЫМ АНТОНОМ</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #fff; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Окошко в стиле модерн */
        .chat-window {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            transition: 0.5s;
        }

        .question {
            font-size: 1.5em;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: underline;
        }
        .question:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* Появление Антона */
        #chigur-zone {
            display: none; 
            margin-top: 20px;
            animation: fadeIn 0.5s steps(4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .chigur-img {
            max-width: 100%;
            border-radius: 5px;
            border: 2px solid red;
            box-shadow: 0 0 20px red;
            margin-bottom: 20px;
            /* Эффект пикселей */
            image-rendering: pixelated; 
            width: 350px; 
        }

        .answer {
            color: red;
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        .back { position: absolute; bottom: 20px; color: #444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="chat-window">
        <!-- Кнопка-вопрос -->
        <div id="ask-btn" class="question" onclick="startTalk()">— Как дела?</div>

        <!-- Зона с Антоном -->
        <div id="chigur-zone">
            <!-- ТОЧНОЕ НАЗВАНИЕ С ТВОЕГО СКРИНШОТА -->
            <img src="chigur_pixel.jpg.jpg" alt="Антон" class="chigur-img">
            <div class="answer">А твоё какое дело.... дружок.</div>
        </div>
    </div>

    <!-- Голос -->
    <audio id="music" src="a-tvoio-kakoe-delo-druzhok_WYWwaQ7.mp3"></audio>

    <a href="index.html" class="back">← уйти, пока цел</a>

    <script>
        function startTalk() {
            document.getElementById('ask-btn').style.display = 'none';
            document.getElementById('chigur-zone').style.display = 'block';

            const music = document.getElementById('music');
            // Проверка: загружен ли звук
            music.play().catch(e => console.log("Браузер ждет клика"));
        }
    </script>

</body>
</html>
