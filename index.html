<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #2d0059 0%, #1a0033 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #ff00ff, #4b0082, #9400d3) 1;
            min-height: 120vh;
        }

        /* Трактор в углу - ПРОСТО КАРТИНКА */
        .corner-tractor {
            position: fixed; top: 20px; right: 20px; width: 100px;
            filter: drop-shadow(0 0 10px #ff00ff); z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #ad-box {
            position: fixed; bottom: 20px; left: 20px; width: 320px;
            background: #fff; color: #000; border: 4px solid red;
            border-radius: 15px; padding: 15px; z-index: 500;
            box-shadow: 0 0 30px rgba(255,0,0,0.7); display: none;
            text-align: left; font-family: Arial, sans-serif;
        }
        .ad-content img { width: 80px; float: left; margin-right: 15px; border-radius: 10px; }
        .ad-btn { background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        #screamer {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 9999; justify-content: center; align-items: center;
        }
        #screamer img { 
            width: 120%; height: 120%; object-fit: cover;
            animation: jump-shake 0.1s infinite;
        }
        @keyframes jump-shake { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-10px, 10px) scale(1.1); } 100% { transform: translate(0,0) scale(1); } }

        .meme-box { background: rgba(45,0,89,0.6); border: 2px solid #ff00ff; border-radius: 30px; padding: 20px; max-width: 600px; margin: 40px auto; }
        img.main-artem { max-width: 100%; border-radius: 20px; }
        .yellow-btn { background: yellow; color: #000; padding: 15px 30px; font-weight: 900; border-radius: 50px; text-decoration: none; display: inline-block; }
        .footer { margin-top: 60px; font-size: 1.4em; color: #ff00ff; }
    </style>
</head>
<body onclick="unlockAudio()">

    <img src="maxresdefault.jpg" class="corner-tractor">

    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p><b>СРОЧНО!</b> Артемий сексуальный в 30 метрах от вас!</p>
            <button class="ad-btn" onclick="startScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <div id="screamer">
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1> Самые умные дураки здесь! </h1>
    <a href="anton.html" class="yellow-btn">ЗАЙДИ СЮДА БЫСТРО</a>

    <div class="meme-box">
        <p>Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-artem">
    </div>

    <div class="footer">Сделано Артемием всевластным дураком чуваком.</div>
    
    <!-- ТУТ ВСЁ ИСПРАВИЛ -->
    <audio id="bg-music" loop src="TRIXXXVD, DORMIRES — Catch Me If You Can (www.lightaudio.ru).mp3"></audio>
    <audio id="scream-audio" src="five-nights-at-freddys-full-stream-sound_2.mp3"></audio>

    <script>
        let isReady = false;

        // Разблокировка для браузера по первому клику на фон
        function unlockAudio() {
            if (!isReady) {
                // "Прогреваем" звуки, чтобы браузер их разрешил
                document.getElementById('scream-audio').load();
                document.getElementById('bg-music').load();
                isReady = true;
                console.log("Артемий разблокировал систему!");
            }
        }

        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 4000);

        function startScreamer() {
            const scream = document.getElementById('scream-audio');
            const music = document.getElementById('bg-music');
            const screen = document.getElementById('screamer');

            document.getElementById('ad-box').style.display = 'none';
            screen.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // ОРЕМ СКРИМЕРОМ
            scream.currentTime = 0;
            scream.play();

            setTimeout(() => {
                screen.style.display = 'none';
                document.body.style.overflow = 'auto';
                // ТОЛЬКО ТЕПЕРЬ ВКЛЮЧАЕМ МУЗЫКУ
                music.play();
            }, 1200);
        }
    </script>
</body>
</html>
