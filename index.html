<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #2d0059 0%, #1a0033 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #ff00ff, #4b0082, #9400d3) 1;
            min-height: 95vh;
            overflow: hidden; /* Чтобы не было прокрутки во время скримера */
        }

        /* Трактор */
        .corner-tractor {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 100px;
            filter: drop-shadow(0 0 10px #ff00ff);
            z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Рекламная плашка */
        #ad-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 320px;
            background: #fff;
            color: #000;
            border: 4px solid red;
            border-radius: 15px;
            padding: 15px;
            z-index: 200;
            box-shadow: 0 0 30px rgba(255,0,0,0.7);
            display: none;
            font-family: Arial, sans-serif;
            text-align: left;
        }
        .ad-content img { width: 80px; float: left; margin-right: 15px; border-radius: 10px; border: 2px solid #000; }
        .ad-btn { 
            background: red; color: white; border: none; padding: 10px 20px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 10px;
            font-size: 1.1em;
        }

        /* СКРИМЕР - ТЕПЕРЬ ВЫЛЕТАЕТ */
        #screamer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #screamer img { 
            height: 100vh; 
            width: auto; 
            animation: jumpscare 0.3s ease-out; /* Анимация вылета */
        }

        @keyframes jumpscare {
            0% { transform: scale(0.1); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        h1 { font-size: 3.5em; text-shadow: 0 0 20px #8a2be2; }
        .meme-box { background: rgba(45,0,89,0.6); border: 2px solid #ff00ff; border-radius: 30px; padding: 20px; max-width: 600px; margin: 40px auto; backdrop-filter: blur(10px); }
        img.main-artem { max-width: 100%; border-radius: 20px; }
        .yellow-btn { background: yellow; color: #000; padding: 15px 30px; font-weight: 900; border-radius: 50px; text-decoration: none; display: inline-block; margin: 20px; }
        .footer { margin-top: 60px; font-size: 1.4em; color: #ff00ff; }
    </style>
</head>
<body>

    <img src="maxresdefault.jpg" class="corner-tractor">

    <!-- РЕКЛАМНАЯ ПЛАШКА -->
    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p style="margin: 0; font-size: 0.9em;"><b>СРОЧНО!</b> Артемий сексуальный в 30 метрах от вас!</p>
            <button class="ad-btn" onclick="startScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <!-- ОКНО СКРИМЕРА -->
    <div id="screamer">
        <!-- Твоя фотка для скримера -->
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1> Самые умные дураки здесь! </h1>
    <a href="anton.html" class="yellow-btn">ЗАЙДИ СЮДА БЫСТРО</a>

    <div class="meme-box">
        <p style="font-size: 1.5em; font-weight: bold;">Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-artem">
    </div>

    <div class="footer">Сделано Артемием всевластным дураком чуваком.</div>
    
    <!-- МУЗЫКА -->
    <audio id="bg-music" loop src="TRIXXXVD, DORMIRES — Catch Me If You Can (www.lightaudio.ru).mp3"></audio>
    
    <!-- ЗВУК СКРИМЕРА - Исправил тег и путь -->
    <audio id="scream-sound" preload="auto">
        <source src="five-nights-at-freddys-full-stream-sound_2.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Показываем плашку через 4 секунды
        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 4000);

        // Музыка теперь НЕ включается при клике на body.
        // Она включится только когда нажмут кнопку "ОТВЕТИТЬ".

        function startScreamer() {
            const screamer = document.getElementById('screamer');
            const screamSound = document.getElementById('scream-sound');
            const bgMusic = document.getElementById('bg-music');
            
            // Прячем рекламу
            document.getElementById('ad-box').style.display = 'none';

            // Показываем скример (теперь он flex для центровки)
            screamer.style.display = 'flex';
            
            // Пытаемся громко включить звук скримера
            screamSound.volume = 1.0;
            screamSound.play().catch(e => alert("Кликни на страницу еще раз, чтобы звук заработал!"));

            // Скример исчезает через 1.2 секунды и ВКЛЮЧАЕТСЯ фоновая музыка
            setTimeout(() => {
                screamer.style.display = 'none';
                bgMusic.play().catch(e => {}); // Музыка стартует ПОСЛЕ скримера
            }, 1200);
        }
    </script>
</body>
</html>
