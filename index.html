<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #2d0059 0%, #1a0033 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #ff00ff, #4b0082, #9400d3) 1;
            min-height: 95vh;
        }

        /* Трактор вместо кнопки в углу */
        .corner-tractor {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 120px;
            filter: drop-shadow(0 0 10px #ff00ff);
            z-index: 1000;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 3.5em; color: #fff; text-shadow: 0 0 20px #8a2be2; }
        
        .meme-box {
            background: rgba(45, 0, 89, 0.6);
            border: 2px solid #ff00ff;
            border-radius: 30px;
            padding: 20px;
            max-width: 600px;
            margin: 40px auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }
        img { max-width: 100%; border-radius: 20px; }

        .yellow-btn {
            background: linear-gradient(145deg, #ffff00, #ffcc00);
            color: #000; padding: 20px 40px; font-weight: 900; 
            border: none; border-radius: 50px; cursor: pointer; 
            font-size: 1.5em; text-decoration: none; display: inline-block;
            margin: 20px; box-shadow: 0 10px 20px rgba(255, 255, 0, 0.3);
        }
        .footer { margin-top: 60px; font-size: 1.4em; color: #ff00ff; }
    </style>
</head>
<!-- Музыка включится при первом клике по сайту -->
<body onclick="playMusic()">

    <!-- ТРАКТОР В УГЛУ -->
    <img src="maxresdefault.jpg" alt="Трактор" class="corner-tractor">

    <h1> Самые умные дураки здесь! </h1>

    <a href="anton.html" class="yellow-btn">ЗАЙДИ СЮДА БЫСТРО</a>

    <div class="meme-box">
        <p style="font-size: 1.5em; font-weight: bold;">Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" alt="Артемий">
    </div>

    <div class="footer">Сделано Артемием всевластным дураком чуваком.</div>
    
    <audio id="bg-music" loop>
        <source src="TRIXXXVD, DORMIRES — Catch Me If You Can (www.lightaudio.ru).mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            var audio = document.getElementById("bg-music");
            audio.play().catch(function(error) {
                console.log("Браузер ждет клика для звука");
            });
        }
    </script>

</body>
</html>
