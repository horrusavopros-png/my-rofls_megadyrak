<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 120vh;
            border: 10px solid #8a2be2;
            box-sizing: border-box;
        }

        /* Кнопка "X" вместо кругляшка */
        .anton-caller {
            position: fixed; top: 20px; left: 20px;
            z-index: 1000; text-align: center;
        }
        .cross-btn {
            width: 60px; height: 60px;
            background: #ff0000;
            clip-path: polygon(20% 0%, 0% 20%, 30% 50%, 0% 80%, 20% 100%, 50% 70%, 80% 100%, 100% 80%, 70% 50%, 100% 20%, 80% 0%, 50% 30%);
            cursor: pointer;
            box-shadow: 0 0 15px #ff0000;
            transition: 0.3s;
        }
        .cross-btn:hover { transform: rotate(90deg) scale(1.1); background: #fff; }
        .btn-label { font-size: 10px; color: #ff0000; font-weight: bold; margin-top: 5px; display: block; }

        /* Трактор */
        #tractor {
            display: none; position: fixed; top: 30px; right: 30px; width: 130px;
            filter: drop-shadow(0 0 15px #ff00ff); z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Плашка Рекламы */
        #ad-box {
            position: fixed; bottom: 30px; left: 30px; width: 320px;
            background: #fff; color: #000; border-left: 12px solid red;
            border-radius: 12px; padding: 20px; z-index: 500;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: none; text-align: left;
        }
        .ad-content img { width: 80px; height: 80px; float: left; margin-right: 15px; border-radius: 50%; border: 2px solid red; }
        .ad-btn { 
            background: #ff0000; color: white; border: none; padding: 12px; 
            cursor: pointer; font-weight: bold; border-radius: 6px; width: 100%; margin-top: 15px;
        }

        /* СКРИМЕР */
        #screamer {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 9999; justify-content: center; align-items: center;
        }
        #screamer img { 
            width: 100%; height: 100%; object-fit: cover;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: scale(1.1) translate(5px, 5px); }
            50% { transform: scale(1.2) translate(-5px, -5px); }
            100% { transform: scale(1.1) translate(5px, -5px); }
        }

        h1 { font-size: 3.5em; text-shadow: 0 0 25px #8a2be2; margin-top: 60px; }
        .card { background: rgba(255, 255, 255, 0.03); border-radius: 25px; padding: 40px; max-width: 550px; margin: 40px auto; border: 1px solid rgba(138, 43, 226, 0.3); }
        .main-img { width: 100%; border-radius: 20px; }
        .go-btn { background: #ffcc00; color: #000; padding: 18px 45px; font-weight: 900; border-radius: 50px; text-decoration: none; display: inline-block; margin: 25px; }
    </style>
</head>
<body onclick="unlockAllAudio()">

    <!-- Новая кнопка призвать Антона -->
    <div class="anton-caller">
        <div class="cross-btn" onclick="showTractor()"></div>
        <span class="btn-label">ПРИЗВАТЬ АНТОНА</span>
    </div>

    <img id="tractor" src="maxresdefault.jpg">

    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p><b>АРТЕМИЙ СЕКСУАЛЬНЫЙ</b></p>
            <p style="font-size: 0.8em; color: #666;">В 30 метрах от вас! Жми скорее!</p>
            <button class="ad-btn" onclick="triggerScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <div id="screamer">
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1>Самые умные дураки здесь!</h1>
    <a href="anton.html" class="go-btn">РАЗГОВОР С АНТОНОМ</a>

    <div class="card">
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-img">
    </div>

    <!-- Аудио. ПРОВЕРЬ: Название файла должно быть в точности как на скриншоте -->
    <audio id="scream-sound" preload="auto">
        <source src="five-nights-at-freddys-full-stream-sound_2.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isAudioUnlocked = false;

        // Разблокировка звука при первом клике на страницу
        function unlockAllAudio() {
            if (!isAudioUnlocked) {
                const scream = document.getElementById('scream-sound');
                scream.play().then(() => {
                    scream.pause();
                    scream.currentTime = 0;
                    isAudioUnlocked = true;
                }).catch(e => console.log("Ждем клика"));
            }
        }

        function showTractor() {
            const t = document.getElementById('tractor');
            t.style.display = (t.style.display === 'block') ? 'none' : 'block';
        }

        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 4000);

        function triggerScreamer() {
            const scream = document.getElementById('scream-sound');
            const screen = document.getElementById('screamer');

            document.getElementById('ad-box').style.display = 'none';
            screen.style.display = 'flex';

            // Громкий запуск звука
            scream.volume = 1.0;
            scream.currentTime = 0;
            scream.play();

            setTimeout(() => {
                screen.style.display = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
