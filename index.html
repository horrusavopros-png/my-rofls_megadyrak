<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Рофлы</title>
    <style>
        /* Стиль сайта (фиолетовый неон) */
        body { 
            background-color: #1a0033; 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #4b0082, #9400d3, #8a2be2) 1;
            min-height: 95vh;
        }
        h1 { color: #bc8f8f; text-shadow: 2px 2px 10px #8a2be2; }
        
        .meme-box {
            background: #2d0059;
            border: 2px solid #8a2be2;
            border-radius: 20px;
            padding: 15px;
            max-width: 600px;
            margin: 30px auto;
            box-shadow: 0 0 20px #4b0082;
        }
        img { max-width: 100%; border-radius: 10px; }

        /* Стиль для желтой кнопки */
        .yellow-btn {
            background: yellow; 
            color: black; 
            padding: 15px 30px; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.2em;
            text-decoration: none;
            display: inline-block;
            margin: 20px;
        }
        .yellow-btn:hover { background: #ffd700; }

        .footer { margin-top: 50px; font-size: 1.2em; color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

    <h1> Самые умные дураки здесь! </h1>

    <!-- Кнопка перехода на вторую страницу -->
    <a href="anton.html" class="yellow-btn">ЗАЙДИ СЮДА БЫСТРО</a>

    <div class="meme-box">
        <p>Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" alt="Артемий">
    </div>

    <div class="footer">Сделано Артемием всевластным дураком чуваком.</div>

</body>
</html>
