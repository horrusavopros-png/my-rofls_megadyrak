<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        /* Современный темный дизайн */
        body { 
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            border: 8px solid #8a2be2; /* Фиолетовая рамка */
        }

        /* Иконка Антона слева сверху */
        .anton-trigger {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 0 15px #ff0000;
        }
        .anton-trigger:hover { transform: scale(1.1); box-shadow: 0 0 25px #ff0000; }

        /* Трактор (скрыт по умолчанию) */
        #corner-tractor {
            display: none; /* ПОЯВИТСЯ ТОЛЬКО ПО КЛИКУ НА АНТОНА */
            position: fixed;
            top: 20px;
            right: 20px;
            width: 120px;
            filter: drop-shadow(0 0 15px #ff00ff);
            z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Рекламная плашка (Модерн стиль) */
        #ad-box {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            border-left: 10px solid red;
            border-radius: 10px;
            padding: 20px;
            z-index: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            text-align: left;
            backdrop-filter: blur(10px);
        }
        .ad-content img { width: 70px; height: 70px; float: left; margin-right: 15px; border-radius: 50%; border: 2px solid red; }
        .ad-btn { 
            background: #ff0000; color: white; border: none; padding: 12px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* СКРИМЕР НА ВЕСЬ ЭКРАН */
        #screamer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #screamer img { 
            width: 100%; height: 100%; object-fit: cover;
            animation: jumpscare 0.1s infinite;
        }
        @keyframes jumpscare {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) translate(5px, 5px); }
            100% { transform: scale(1); }
        }

        /* Основной контент */
        h1 { font-size: 3em; text-shadow: 0 0 20px #8a2be2; margin-top: 80px; }
        .meme-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        img.main-photo { width: 100%; border-radius: 15px; border: 2px solid #8a2be2; }
        .nav-btn { background: #ffcc00; color: #000; padding: 15px 40px; font-weight: bold; border-radius: 50px; text-decoration: none; display: inline-block; margin: 20px; transition: 0.3s; }
        .nav-btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- ИКОНКА АНТОНА (Кликни, чтобы призвать трактор) -->
    <img src="ANTONCHIGYN" class="anton-trigger" onclick="toggleTractor()" title="Призвать трактор">

    <!-- ТРАКТОР -->
    <img id="corner-tractor" src="maxresdefault.jpg">

    <!-- РЕКЛАМА -->
    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p style="margin: 0; font-weight: bold;">АРТЕМИЙ СЕКСУАЛЬНЫЙ</p>
            <p style="margin: 5px 0 0 0; font-size: 0.8em; color: #555;">В 30 метрах от вас...</p>
            <button class="ad-btn" onclick="startScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <!-- СКРИМЕР -->
    <div id="screamer">
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1>Самые умные дураки здесь!</h1>
    
    <a href="anton.html" class="nav-btn">РАЗГОВОР С АНТОНОМ</a>

    <div class="meme-card">
        <p style="font-size: 1.2em; margin-bottom: 20px;">Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-photo">
    </div>

    <p style="margin-top: 100px; color: #ff00ff; font-weight: bold;">Сделано Артемием всевластным дураком чуваком.</p>

    <!-- ЗВУК СКРИМЕРА -->
    <audio id="scream-audio" preload="auto">
        <source src="five-nights-at-freddys-full-stream-sound_2.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Функция призыва трактора
        function toggleTractor() {
            const tractor = document.getElementById('corner-tractor');
            if (tractor.style.display === 'block') {
                tractor.style.display = 'none';
            } else {
                tractor.style.display = 'block';
                alert("ТРАКТОР ПРИБЫЛ!");
            }
        }

        // Показ рекламы через 4 сек
        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 4000);

        // Логика скримера
        function startScreamer() {
            const scream = document.getElementById('scream-audio');
            const scScreen = document.getElementById('screamer');
            
            document.getElementById('ad-box').style.display = 'none';
            scScreen.style.display = 'flex';

            // Орем!
            scream.currentTime = 0;
            scream.play().catch(e => alert("Браузер блокирует звук! Кликни на Антончика в углу сначала."));

            // Убираем скример через 1.5 сек
            setTimeout(() => {
                scScreen.style.display = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
