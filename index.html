<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАЗГОВОР С АНТОНОМ</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #fff; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-window {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }

        .question {
            font-size: 1.5em;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }

        #chigur-zone {
            display: none;
            margin-top: 20px;
            animation: fadeIn 1s ease-in;
        }

        /* ЭФФЕКТ ПИКСЕЛЕЙ */
        .chigur-img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid red;
            /* Магия пикселизации */
            image-rendering: pixelated; 
            filter: contrast(150%) brightness(90%);
            width: 300px; /* Сделаем чуть меньше, чтобы пиксели были крупнее */
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .answer {
            color: red;
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 15px;
        }

        .back { position: absolute; bottom: 20px; color: #444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="chat-window">
        <div id="ask-btn" class="question" onclick="startTalk()">— Как дела?</div>

        <div id="chigur-zone">
            <!-- ТВОЯ НОВАЯ ФОТКА -->
            <img src="chigur_pixel.jpg" alt="Антон" class="chigur-img">
            <div class="answer">А твоё какое дело.... дружок.</div>
        </div>
    </div>

    <audio id="music" src="a-tvoio-kakoe-delo-druzhok_WYWwaQ7.mp3"></audio>

    <a href="index.html" class="back">← уйти, пока цел</a>

    <script>
        function startTalk() {
            document.getElementById('ask-btn').style.display = 'none';
            document.getElementById('chigur-zone').style.display = 'block';

            const music = document.getElementById('music');
            music.play().catch(e => console.log("Нужен клик"));
        }
    </script>

</body>
</html>
