<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Рофлы</title>
    <style>
        /* Основной фон и шрифт */
        body { 
            background-color: #1a0033; /* Темно-фиолетовый */
            color: #e0b0ff; /* Светло-пурпурный текст */
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Та самая RGB лента по краям */
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #4b0082, #9400d3, #8a2be2) 1;
            min-height: 90vh;
        }

        h1 { 
            color: #bc8f8f; 
            text-shadow: 2px 2px 10px #8a2be2;
        }

        .meme-box {
            background: #2d0059;
            border: 2px solid #8a2be2;
            border-radius: 20px;
            padding: 15px;
            max-width: 600px;
            margin: 20px auto;
            box-shadow: 0 0 20px #4b0082;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }

        .footer { margin-top: 50px; font-size: 0.8em; opacity: 0.6; }
    </style>
</head>
<body>

    <h1>🤡 МЕГА РОФЛЫ 🤡</h1>

    <div class="meme-box">
        <p>Когда создал свой первый сайт и чувствуешь себя хакером:</p>
        <!-- Пока тут будет картинка из интернета для примера -->
        <img src="https://media.giphy.com" alt="Хацкер">
    </div>

    <div class="footer">Сделано на коленке специально для рофлов</div>
