<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #2d0059 0%, #1a0033 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            border: 10px solid;
            border-image: linear-gradient(45deg, #8a2be2, #ff00ff, #4b0082, #9400d3) 1;
            min-height: 120vh; /* Сайт можно листать */
        }

        /* Прыгающий трактор */
        .corner-tractor {
            position: fixed; top: 20px; right: 20px; width: 100px;
            filter: drop-shadow(0 0 10px #ff00ff); z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Плашка рекламы */
        #ad-box {
            position: fixed; bottom: 20px; left: 20px; width: 320px;
            background: #fff; color: #000; border: 4px solid red;
            border-radius: 15px; padding: 15px; z-index: 500;
            box-shadow: 0 0 30px rgba(255,0,0,0.7); display: none;
            text-align: left; font-family: Arial, sans-serif;
        }
        .ad-content img { width: 80px; float: left; margin-right: 15px; border-radius: 10px; }
        .ad-btn { 
            background: red; color: white; border: none; padding: 10px 20px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 10px;
        }

        /* СКРИМЕР - ВЫЛЕТАЕТ ИЗ ТЕМНОТЫ */
        #screamer {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 9999;
            justify-content: center; align-items: center;
        }
        #screamer img { 
            width: 110%; height: 110%; object-fit: cover;
            animation: jump 0.15s linear; /* Очень быстрый вылет */
        }

        @keyframes jump {
            0% { transform: scale(0.5); }
            100% { transform: scale(1.1); }
        }

        .meme-box { background: rgba(45,0,89,0.6); border: 2px solid #ff00ff; border-radius: 30px; padding: 20px; max-width: 600px; margin: 40px auto; }
        img.main-artem { max-width: 100%; border-radius: 20px; }
        .yellow-btn { background: yellow; color: #000; padding: 15px 30px; font-weight: 900; border-radius: 50px; text-decoration: none; display: inline-block; }
        .footer { margin-top: 100px; font-size: 1.4em; color: #ff00ff; }
    </style>
</head>
<body>

    <img src="maxresdefault.jpg" class="corner-tractor">

    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p><b>СРОЧНО!</b> Артемий сексуальный в 30 метрах от вас!</p>
            <button class="ad-btn" onclick="triggerScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <div id="screamer">
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1> Самые умные дураки здесь! </h1>
    <a href="anton.html" class="yellow-btn">ЗАЙДИ СЮДА БЫСТРО</a>

    <div class="meme-box">
        <p>Артемий Всевластный:</p>
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-artem">
    </div>

    <div class="footer">Сделано Артемием всевластным дураком чуваком.</div>
    
    <!-- ЗВУКИ -->
    <audio id="bg-music" loop src="TRIXXXVD, DORMIRES — Catch Me If You Can (www.lightaudio.ru).mp3"></audio>
    <audio id="scream-audio" preload="auto" src="five-nights-at-freddys-full-stream-sound_2.mp3"></audio>

    <script>
        // Показываем рекламу через 3 секунды
        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 3000);

        function triggerScreamer() {
            const screamer = document.getElementById('screamer');
            const screamSound = document.getElementById('scream-audio');
            const bgMusic = document.getElementById('bg-music');

            // 1. Прячем плашку
            document.getElementById('ad-box').style.display = 'none';

            // 2. Сначала запускаем звук (важно, чтобы это было ПЕРВЫМ действием после клика)
            screamSound.volume = 1.0;
            screamSound.play().then(() => {
                // 3. Только если звук пошел, показываем картинку
                screamer.style.display = 'flex';
                document.body.style.overflow = 'hidden';

                // 4. Скример висит 1.3 секунды
                setTimeout(() => {
                    screamer.style.display = 'none';
                    document.body.style.overflow = 'auto';
                    // 5. Включаем фоновую музыку ПОСЛЕ скримера
                    bgMusic.play();
                }, 1300);
            }).catch(e => {
                // Если браузер все же заблочил, выводим подсказку
                alert("Ошибка звука! Кликни на страницу еще раз и жми кнопку.");
            });
        }
    </script>
</body>
</html>
