<<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логово Артемия Всевластного</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); 
            color: #e0b0ff; 
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            border: 8px solid #8a2be2;
        }

        /* Иконка Антона (Секретка) */
        .anton-trigger {
            position: fixed; top: 15px; left: 15px; width: 60px; height: 60px;
            border-radius: 50%; border: 2px solid #ff0000; cursor: pointer;
            z-index: 1000; transition: 0.3s; box-shadow: 0 0 15px #ff0000;
        }
        .anton-trigger:hover { transform: scale(1.1); box-shadow: 0 0 25px #ff0000; }

        /* Трактор */
        #corner-tractor {
            display: none; position: fixed; top: 20px; right: 20px; width: 120px;
            filter: drop-shadow(0 0 15px #ff00ff); z-index: 100;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Плашка Рекламы */
        #ad-box {
            position: fixed; bottom: 25px; left: 25px; width: 300px;
            background: rgba(255, 255, 255, 0.95); color: #000; border-left: 10px solid red;
            border-radius: 10px; padding: 20px; z-index: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; text-align: left;
        }
        .ad-content img { width: 70px; height: 70px; float: left; margin-right: 15px; border-radius: 50%; border: 2px solid red; }
        .ad-btn { 
            background: #ff0000; color: white; border: none; padding: 12px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 15px;
        }

        /* СКРИМЕР */
        #screamer {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; z-index: 9999; justify-content: center; align-items: center;
        }
        #screamer img { 
            width: 100%; height: 100%; object-fit: cover;
            animation: jumpscare 0.1s infinite;
        }
        @keyframes jumpscare { 0% { transform: scale(1); } 50% { transform: scale(1.1) translate(5px, 5px); } 100% { transform: scale(1); } }

        h1 { font-size: 3em; text-shadow: 0 0 20px #8a2be2; margin-top: 80px; }
        .meme-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; max-width: 500px; margin: 40px auto; }
        img.main-photo { width: 100%; border-radius: 15px; border: 2px solid #8a2be2; }
        .nav-btn { background: #ffcc00; color: #000; padding: 15px 40px; font-weight: bold; border-radius: 50px; text-decoration: none; display: inline-block; margin: 20px; }
    </style>
</head>
<!-- Самое важное: onclick="unlockAudio()" -->
<body onclick="unlockAudio()">

    <img src="ANTONCHIGYN" class="anton-trigger" onclick="toggleTractor()">
    <img id="corner-tractor" src="maxresdefault.jpg">

    <div id="ad-box">
        <div class="ad-content">
            <img src="photo_2024-09-13_10-19-47 (2).jpg">
            <p style="margin: 0; font-weight: bold;">АРТЕМИЙ СЕКСУАЛЬНЫЙ</p>
            <p style="margin: 5px 0 0 0; font-size: 0.8em;">В 30 метрах от вас...</p>
            <button class="ad-btn" onclick="startScreamer()">ОТВЕТИТЬ</button>
        </div>
    </div>

    <div id="screamer">
        <img src="photo_2024-09-13_10-19-47 (2).jpg">
    </div>

    <h1>Самые умные дураки здесь!</h1>
    <a href="anton.html" class="nav-btn">РАЗГОВОР С АНТОНОМ</a>

    <div class="meme-card">
        <img src="photo_2024-09-13_10-19-47 (2).jpg" class="main-photo">
    </div>

    <audio id="scream-audio">
        <source src="five-nights-at-freddys-full-stream-sound_2.mp3" type="audio/mpeg">
    </audio>

    <script>
        let audioUnlocked = false;

        // ЭТА ФУНКЦИЯ "ПРИУЧАЕТ" БРАУЗЕР К ЗВУКУ
        function unlockAudio() {
            if (!audioUnlocked) {
                const scream = document.getElementById('scream-audio');
                scream.play().then(() => {
                    scream.pause();
                    scream.currentTime = 0;
                }).catch(e => console.log("Ждем нормального клика"));
                audioUnlocked = true;
            }
        }

        function toggleTractor() {
            const tr = document.getElementById('corner-tractor');
            tr.style.display = (tr.style.display === 'block') ? 'none' : 'block';
        }

        setTimeout(() => {
            document.getElementById('ad-box').style.display = 'block';
        }, 4000);

        function startScreamer() {
            const scream = document.getElementById('scream-audio');
            const screen = document.getElementById('screamer');
            
            document.getElementById('ad-box').style.display = 'none';
            screen.style.display = 'flex';

            // Громкость на максимум и ПОЕХАЛИ
            scream.volume = 1.0;
            scream.play();

            setTimeout(() => {
                screen.style.display = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
